<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body class="bg-white">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-50 focus:rounded-md focus:bg-primary-600 focus:px-4 focus:py-2 focus:text-sm focus:font-semibold focus:text-white focus:shadow-lg">
    Skip to main content
  </a>
  {{ partial "banner.html" . }}
  {{ partial "header.html" . }}

  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- Alpine.js for interactive components -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Scroll reveal for below-fold sections -->
  <script>
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      const o = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); o.unobserve(e.target); } });
      }, { threshold: 0.15 });
      document.querySelectorAll('.reveal').forEach(el => o.observe(el));
    } else {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
    }
  </script>

  <!-- Console Easter Egg -->
  <script>
    console.log(`
    You found the console. We like you already.

    This site was built by Firefly Software — a small studio
    that builds fast, honest websites for small businesses.

    No templates. No page builders. Just clean code and clear thinking.

    If your business deserves better than a template, let's talk.
    https://fireflysoftware.dev
    `);
  </script>

  <!-- Plausible Analytics -->
  <script defer data-domain="momentumbusiness.org" src="https://plausible.angmar.dev/js/script.js"></script>
</body>
</html>
